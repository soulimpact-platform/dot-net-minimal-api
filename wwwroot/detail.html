<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>書籍詳細画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>書籍詳細</h1>

        <div class="detail-area">
            <p>
                <strong>書籍名：</strong>
                <span id="name"></span>
            </p>

            <p>
                <strong>カテゴリ：</strong>
                <span id="category"></span>
            </p>

            <p>
                <strong>価格：</strong>
                <span id="price"></span>
            </p>

            <p>
                <strong>説明：</strong>
                <span id="description"></span>
            </p>
        </div>

        <p id="message" class="message"></p>

        <button id="backButton">前の画面へ戻る</button>
    </div>

    <script src="detail.js"></script>
</body>
</html>
