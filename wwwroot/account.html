<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アカウント表示画面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>アカウント表示画面</h1>

        <div class="form-area">
            <div class="account-info">
                <p>ログインに成功しました。</p>
                <p>
                    ユーザー名：
                    <strong><span id="username"></span></strong>
                </p>
            </div>

            <div class="action-area">
                <button id="searchPageButton">書籍検索画面へ</button>
            </div>

            <div id="adminMenu" class="admin-menu">
                <h2>管理者メニュー</h2>

                <div class="action-area">
                    <button id="userManageButton">ユーザ管理</button>
                    <button id="bookManageButton">書籍管理</button>
                </div>
            </div>

            <div class="action-area">
                <button id="logoutButton">ログアウト</button>
            </div>
        </div>
    </div>

    <script src="account.js"></script>
</body>
</html>
