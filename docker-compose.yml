services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=login_sample;Username=app_user;Password=app_password
      - Jwt__Secret=V7xq9mK2pL4sN8rT6yB3cD5fG1hJ0aZ9uW2eR4tY6iO8pA1sD3fG5hJ7kL9
      - Jwt__Issuer=dot-net-minimal-api
      - Jwt__Audience=dot-net-minimal-api-user
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=login_sample
      - POSTGRES_USER=app_user
      - POSTGRES_PASSWORD=app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d login_sample"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: